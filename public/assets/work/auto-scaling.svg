<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="box-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A3343" />
      <stop offset="100%" stop-color="#1A2333" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Auto-scaling Visualization -->
  <rect x="150" y="150" width="500" height="150" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Load Graph with Gradient -->
  <path d="M150,150 L190,140 L230,145 L270,120 L310,100 L350,90 L390,95 L430,105 L470,120 L510,135 L550,145 L590,150 L630,145 L650,150 L650,150 L150,150 Z" fill="#3366FF" fill-opacity="0.1" stroke="none"/>
  <polyline points="150,150 190,140 230,145 270,120 310,100 350,90 390,95 430,105 470,120 510,135 550,145 590,150 630,145" fill="none" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Service Instances with Gradients and Icons -->
  <!-- Row 1 -->
  <rect x="170" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="190" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">API</text>
  
  <rect x="230" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="250" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Auth</text>
  
  <rect x="290" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="310" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">User</text>
  
  <rect x="350" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="370" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Cart</text>
  
  <rect x="410" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="430" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Order</text>
  
  <rect x="470" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="490" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Pay</text>
  
  <rect x="530" y="170" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="550" y="195" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Notify</text>
  
  <!-- Row 2 -->
  <rect x="170" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="190" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">API</text>
  
  <rect x="230" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="250" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Auth</text>
  
  <rect x="290" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="310" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">User</text>
  
  <rect x="350" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="370" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Cart</text>
  
  <rect x="410" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="430" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Order</text>
  
  <rect x="470" y="220" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="490" y="245" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Pay</text>
  
  <rect x="530" y="220" width="40" height="0" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Row 3 (Scaled instances) -->
  <rect x="170" y="270" width="40" height="0" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1" opacity="0.3"/>
  
  <rect x="230" y="270" width="40" height="0" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1" opacity="0.3"/>
  
  <rect x="290" y="270" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="310" y="295" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">User</text>
  
  <rect x="350" y="270" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="370" y="295" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Cart</text>
  
  <rect x="410" y="270" width="40" height="40" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1"/>
  <text x="430" y="295" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Order</text>
  
  <rect x="470" y="270" width="40" height="0" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1" opacity="0.3"/>
  
  <rect x="530" y="270" width="40" height="0" rx="3" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Service Mesh Lines with Animation -->
  <line x1="190" y1="190" x2="230" y2="190" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" />
  </line>
  <line x1="270" y1="190" x2="310" y2="190" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite" />
  </line>
  <line x1="350" y1="190" x2="390" y2="190" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite" />
  </line>
  <line x1="430" y1="190" x2="470" y2="190" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite" />
  </line>
  <line x1="510" y1="190" x2="550" y2="190" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;0.8;0.5" dur="4.5s" repeatCount="indefinite" />
  </line>
  
  <line x1="190" y1="240" x2="230" y2="240" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="270" y1="240" x2="310" y2="240" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="350" y1="240" x2="390" y2="240" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="430" y1="240" x2="470" y2="240" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  
  <line x1="310" y1="290" x2="350" y2="290" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="390" y1="290" x2="430" y2="290" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  
  <!-- Vertical Connections -->
  <line x1="190" y1="210" x2="190" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="230" y1="210" x2="230" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="310" y1="210" x2="310" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="310" y1="260" x2="310" y2="270" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="370" y1="210" x2="370" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="370" y1="260" x2="370" y2="270" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="430" y1="210" x2="430" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="430" y1="260" x2="430" y2="270" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="490" y1="210" x2="490" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="550" y1="210" x2="550" y2="220" stroke="#3366FF" stroke-width="1" stroke-opacity="0.5"/>
  
  <!-- Auto-scaling Controller -->
  <rect x="350" y="320" width="100" height="25" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="400" y="337" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Auto-scaler</text>
  
  <!-- Controller Connections -->
  <line x1="400" y1="320" x2="400" y2="300" stroke="#3366FF" stroke-width="1" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="6;0" dur="10s" repeatCount="indefinite" />
  </line>
  
  <!-- Load Balancer -->
  <rect x="100" y="200" width="30" height="60" rx="3" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="115" y="235" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle" transform="rotate(-90,115,235)">Load Balancer</text>
  
  <!-- Load Balancer Connections -->
  <line x1="130" y1="210" x2="170" y2="190" stroke="#3366FF" stroke-width="1" stroke-dasharray="3,2">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite" />
  </line>
  <line x1="130" y1="230" x2="170" y2="240" stroke="#3366FF" stroke-width="1" stroke-dasharray="3,2">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
  </line>
  <line x1="130" y1="250" x2="290" y2="290" stroke="#3366FF" stroke-width="1" stroke-dasharray="3,2">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" />
  </line>
  
  <!-- Traffic Indicators -->
  <circle cx="140" y="210" r="3" fill="#3366FF">
    <animate attributeName="cx" values="130;170" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="140" y="230" r="3" fill="#3366FF">
    <animate attributeName="cx" values="130;170" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="140" y="250" r="3" fill="#3366FF">
    <animate attributeName="cx" values="130;290" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Metrics -->
  <rect x="650" y="170" width="80" height="130" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="690" y="190" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Metrics</text>
  
  <!-- CPU Gauge -->
  <path d="M690,220 A15,15 0 0 1 675,205 A15,15 0 0 1 690,190" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M690,220 A15,15 0 0 1 675,205 A15,15 0 0 1 682.5,191" fill="none" stroke="#3366FF" stroke-width="3" stroke-opacity="0.7"/>
  <text x="690" y="225" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">CPU</text>
  
  <!-- Memory Gauge -->
  <path d="M690,260 A15,15 0 0 1 675,245 A15,15 0 0 1 690,230" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M690,260 A15,15 0 0 1 675,245 A15,15 0 0 1 687,231" fill="none" stroke="#3366FF" stroke-width="3" stroke-opacity="0.7"/>
  <text x="690" y="265" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">MEM</text>
  
  <!-- Glow Effects -->
  <rect x="150" y="150" width="500" height="150" rx="5" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="90" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Auto-scaling Microservices Platform</text>
  <text x="400" y="120" font-family="Arial" font-size="18" fill="#3366FF" text-anchor="middle">Building for Elasticity and Resilience</text>
</svg>
