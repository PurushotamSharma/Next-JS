<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="box-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#141C2B" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#00FF99" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- GitOps Flow Diagram -->
  
  <!-- Git Repository -->
  <rect x="120" y="170" width="150" height="80" rx="5" fill="url(#box-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="195" y="195" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Git Repository</text>
  <text x="195" y="215" font-family="Arial" font-size="10" fill="#00FF99" text-anchor="middle">Single Source of Truth</text>
  
  <!-- Git Icon -->
  <path d="M175,235 L195,235 L195,225 L205,240 L195,255 L195,245 L175,245 L175,255 L165,240 L175,225 Z" fill="#00FF99" opacity="0.7" />
  
  <!-- Code Files -->
  <rect x="215" y="230" width="20" height="25" rx="2" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <line x1="220" y1="235" x2="230" y2="235" stroke="#00FF99" stroke-width="1"/>
  <line x1="220" y1="240" x2="230" y2="240" stroke="#00FF99" stroke-width="1"/>
  <line x1="220" y1="245" x2="225" y2="245" stroke="#00FF99" stroke-width="1"/>
  
  <!-- Forward Flow Arrow -->
  <line x1="270" y1="210" x2="330" y2="210" stroke="#00FF99" stroke-width="2"/>
  <circle cx="300" cy="210" r="5" fill="#00FF99" opacity="0.5" />
  <polygon points="330,205 340,210 330,215" fill="#00FF99"/>
  
  <!-- CI/CD Pipeline -->
  <rect x="340" y="170" width="120" height="80" rx="5" fill="url(#box-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="400" y="195" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">CI/CD Pipeline</text>
  <text x="400" y="215" font-family="Arial" font-size="10" fill="#00FF99" text-anchor="middle">Automated Validation</text>
  
  <!-- Pipeline Steps -->
  <rect x="360" y="230" width="20" height="15" rx="2" fill="#00FF99" opacity="0.3"/>
  <rect x="390" y="230" width="20" height="15" rx="2" fill="#00FF99" opacity="0.5"/>
  <rect x="420" y="230" width="20" height="15" rx="2" fill="#00FF99" opacity="0.7"/>
  
  <!-- Forward Flow Arrow -->
  <line x1="460" y1="210" x2="520" y2="210" stroke="#00FF99" stroke-width="2"/>
  <circle cx="490" cy="210" r="5" fill="#00FF99" opacity="0.5" />
  <polygon points="520,205 530,210 520,215" fill="#00FF99"/>
  
  <!-- Kubernetes Cluster -->
  <rect x="530" y="170" width="150" height="80" rx="5" fill="url(#box-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="605" y="195" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Kubernetes</text>
  <text x="605" y="215" font-family="Arial" font-size="10" fill="#00FF99" text-anchor="middle">Desired State</text>
  
  <!-- Kubernetes Icon -->
  <path d="M585,235 L625,235 L625,245 L605,255 L585,245 Z" fill="#00FF99" opacity="0.4" />
  <circle cx="605" cy="240" r="10" fill="none" stroke="#00FF99" stroke-width="1"/>
  
  <!-- Feedback Loop -->
  <path d="M605,250 C605,290 195,290 195,250" fill="none" stroke="#00FF99" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="195,255 195,245 185,250" fill="#00FF99"/>
  <text x="400" y="305" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Continuous Reconciliation</text>
  
  <!-- Environment Stages -->
  <rect x="530" y="140" width="30" height="20" rx="3" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <text x="545" y="154" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Dev</text>
  
  <rect x="570" y="140" width="30" height="20" rx="3" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <text x="585" y="154" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Test</text>
  
  <rect x="610" y="140" width="30" height="20" rx="3" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <text x="625" y="154" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Prod</text>
  
  <rect x="650" y="140" width="30" height="20" rx="3" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <text x="665" y="154" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">DR</text>
  
  <!-- Developers -->
  <circle cx="120" cy="140" r="15" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <circle cx="120" cy="135" r="5" fill="#00FF99" opacity="0.5"/>
  <path d="M110,145 C110,155 130,155 130,145" fill="none" stroke="#00FF99" stroke-width="1"/>
  
  <circle cx="150" cy="140" r="15" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <circle cx="150" cy="135" r="5" fill="#00FF99" opacity="0.5"/>
  <path d="M140,145 C140,155 160,155 160,145" fill="none" stroke="#00FF99" stroke-width="1"/>
  
  <!-- Pull Request Flow -->
  <line x1="135" y1="155" x2="170" y2="170" stroke="#00FF99" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="170,165 175,170 170,175" fill="#00FF99"/>
  
  <!-- Glow Effects -->
  <rect x="120" y="170" width="150" height="80" rx="5" fill="none" stroke="#00FF99" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="340" y="170" width="120" height="80" rx="5" fill="none" stroke="#00FF99" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="530" y="170" width="150" height="80" rx="5" fill="none" stroke="#00FF99" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="100" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">GitOps Workflow Implementation</text>
  <text x="400" y="130" font-family="Arial" font-size="18" fill="#00FF99" text-anchor="middle">Infrastructure as Code Meets CI/CD</text>
  
  <!-- Metrics -->
  <text x="400" y="340" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">Deployment frequency increased by 400%</text>
  <text x="400" y="360" font-family="Arial" font-size="14" fill="#00FF99" text-anchor="middle">100% audit trail for all changes</text>
</svg>
