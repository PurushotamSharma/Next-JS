<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="code-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#141C2B" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#00FF99" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Code Section -->
  <rect x="100" y="150" width="250" height="150" rx="5" fill="url(#code-gradient)" stroke="#00FF99" stroke-width="1.5"/>
  
  <!-- Line Numbers -->
  <rect x="100" y="150" width="20" height="150" fill="#1A2333" opacity="0.7"/>
  <text x="110" y="170" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">1</text>
  <text x="110" y="190" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">2</text>
  <text x="110" y="210" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">3</text>
  <text x="110" y="230" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">4</text>
  <text x="110" y="250" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">5</text>
  <text x="110" y="270" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">6</text>
  <text x="110" y="290" font-family="monospace" font-size="10" fill="#555555" text-anchor="middle">7</text>
  
  <!-- Code Content -->
  <text x="125" y="170" font-family="monospace" font-size="12" fill="#00FF99">resource "aws_instance" "web" {</text>
  <text x="125" y="190" font-family="monospace" font-size="12" fill="#FFFFFF">  ami           = "ami-005e54dee72cc1d00"</text>
  <text x="125" y="210" font-family="monospace" font-size="12" fill="#FFFFFF">  instance_type = "t2.micro"</text>
  <text x="125" y="230" font-family="monospace" font-size="12" fill="#FFFFFF">  tags = {</text>
  <text x="125" y="250" font-family="monospace" font-size="12" fill="#FFFFFF">    Name = "terraform-example"</text>
  <text x="125" y="270" font-family="monospace" font-size="12" fill="#FFFFFF">  }</text>
  <text x="125" y="290" font-family="monospace" font-size="12" fill="#00FF99">}</text>
  
  <!-- Code Editor UI Elements -->
  <rect x="100" y="150" width="250" height="20" fill="#141C2B" stroke="#00FF99" stroke-width="1"/>
  <circle cx="110" cy="160" r="3" fill="#FF605C"/>
  <circle cx="120" cy="160" r="3" fill="#FFBD44"/>
  <circle cx="130" cy="160" r="3" fill="#00CA4E"/>
  <text x="225" y="164" font-family="monospace" font-size="10" fill="#FFFFFF" text-anchor="middle">main.tf</text>
  
  <!-- Infrastructure Diagram -->
  <rect x="450" y="150" width="250" height="150" rx="5" fill="#1A2333" stroke="#00FF99" stroke-width="1.5"/>
  
  <!-- Cloud Platform -->
  <path d="M500,170 Q530,150 560,170 Q590,150 580,190 Q610,200 580,220 Q590,250 560,240 Q530,260 500,240 Q470,250 480,220 Q450,200 480,190 Q470,150 500,170" fill="#2A3343" stroke="#00FF99" stroke-width="1.5" opacity="0.8"/>
  <text x="530" y="205" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">AWS Cloud</text>
  
  <!-- Server Instances -->
  <rect x="490" y="240" width="30" height="40" rx="2" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <rect x="495" y="245" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  <rect x="495" y="255" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  
  <rect x="530" y="240" width="30" height="40" rx="2" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <rect x="535" y="245" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  <rect x="535" y="255" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  
  <rect x="570" y="240" width="30" height="40" rx="2" fill="#1A2333" stroke="#00FF99" stroke-width="1"/>
  <rect x="575" y="245" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  <rect x="575" y="255" width="20" height="5" rx="1" fill="#00FF99" opacity="0.5"/>
  
  <!-- Network Lines -->
  <line x1="505" y1="240" x2="505" y2="220" stroke="#00FF99" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="545" y1="240" x2="545" y2="220" stroke="#00FF99" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="585" y1="240" x2="585" y2="220" stroke="#00FF99" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- Transformation Arrow -->
  <line x1="360" y1="225" x2="430" y2="225" stroke="#00FF99" stroke-width="2"/>
  <polygon points="430,220 440,225 430,230" fill="#00FF99"/>
  
  <!-- Transformation Icons -->
  <circle cx="375" cy="225" r="10" fill="#2A3343" stroke="#00FF99" stroke-width="1"/>
  <text x="375" y="229" font-family="Arial" font-size="12" fill="#00FF99" text-anchor="middle">1</text>
  
  <circle cx="400" cy="225" r="10" fill="#2A3343" stroke="#00FF99" stroke-width="1"/>
  <text x="400" y="229" font-family="Arial" font-size="12" fill="#00FF99" text-anchor="middle">2</text>
  
  <circle cx="425" cy="225" r="10" fill="#2A3343" stroke="#00FF99" stroke-width="1"/>
  <text x="425" y="229" font-family="Arial" font-size="12" fill="#00FF99" text-anchor="middle">3</text>
  
  <!-- Title with glow effect -->
  <text x="400" y="100" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Infrastructure as Code</text>
  <text x="400" y="130" font-family="Arial" font-size="18" fill="#00FF99" text-anchor="middle">Automate Your Cloud Environment</text>
  
  <!-- Metrics -->
  <text x="400" y="330" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">Cloud costs reduced by 32%</text>
  <text x="400" y="350" font-family="Arial" font-size="14" fill="#00FF99" text-anchor="middle">Configuration drift eliminated</text>
</svg>
