<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="box-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#141C2B" />
    </linearGradient>
    <linearGradient id="data-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3366FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3366FF" stop-opacity="0.7" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Data Flow Animation -->
  <path d="M100,320 L700,320" stroke="#3366FF" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="150" cy="320" r="3" fill="#3366FF">
    <animate attributeName="cx" values="150;700" dur="8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="180" cy="320" r="3" fill="#3366FF">
    <animate attributeName="cx" values="180;730" dur="10s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="120" cy="320" r="3" fill="#3366FF">
    <animate attributeName="cx" values="120;670" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite" />
  </circle>
  
  <!-- Data Sources with Details -->
  <rect x="100" y="170" width="100" height="60" rx="5" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="2"/>
  <text x="150" y="190" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Data Sources</text>
  <text x="150" y="210" font-family="Arial" font-size="10" fill="#3366FF" text-anchor="middle">Multi-Format Input</text>
  
  <!-- Source Icons -->
  <rect x="110" y="140" width="20" height="20" rx="2" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="120" y="155" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">DB</text>
  
  <circle cx="150" cy="150" r="10" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="150" y="154" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">IoT</text>
  
  <rect x="170" y="140" width="20" height="20" rx="2" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="180" y="155" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">API</text>
  
  <!-- Data Flow Arrow with Animation -->
  <line x1="200" y1="200" x2="240" y2="200" stroke="#3366FF" stroke-width="2"/>
  <circle cx="220" cy="200" r="3" fill="#3366FF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <polygon points="240,195 250,200 240,205" fill="#3366FF"/>
  
  <!-- Ingest with Details -->
  <rect x="250" y="170" width="100" height="60" rx="5" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="2"/>
  <text x="300" y="190" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Ingest</text>
  <text x="300" y="210" font-family="Arial" font-size="10" fill="#3366FF" text-anchor="middle">Kafka / Kinesis</text>
  
  <!-- Streaming Icon -->
  <path d="M280,140 L290,150 L280,160 M290,140 L300,150 L290,160 M300,140 L310,150 L300,160" fill="none" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Data Flow Arrow with Animation -->
  <line x1="350" y1="200" x2="390" y2="200" stroke="#3366FF" stroke-width="2"/>
  <circle cx="370" cy="200" r="3" fill="#3366FF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <polygon points="390,195 400,200 390,205" fill="#3366FF"/>
  
  <!-- Process with Details -->
  <rect x="400" y="170" width="100" height="60" rx="5" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="2"/>
  <text x="450" y="190" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Process</text>
  <text x="450" y="210" font-family="Arial" font-size="10" fill="#3366FF" text-anchor="middle">Spark / Flink</text>
  
  <!-- Processing Icon -->
  <rect x="430" y="140" width="40" height="20" rx="2" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <line x1="435" y1="145" x2="465" y2="145" stroke="#3366FF" stroke-width="1"/>
  <line x1="435" y1="150" x2="455" y2="150" stroke="#3366FF" stroke-width="1"/>
  <line x1="435" y1="155" x2="460" y2="155" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Data Flow Arrow with Animation -->
  <line x1="500" y1="200" x2="540" y2="200" stroke="#3366FF" stroke-width="2"/>
  <circle cx="520" cy="200" r="3" fill="#3366FF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <polygon points="540,195 550,200 540,205" fill="#3366FF"/>
  
  <!-- Analytics with Details -->
  <rect x="550" y="170" width="100" height="60" rx="5" fill="url(#box-gradient)" stroke="#3366FF" stroke-width="2"/>
  <text x="600" y="190" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Analytics</text>
  <text x="600" y="210" font-family="Arial" font-size="10" fill="#3366FF" text-anchor="middle">ML / BI Dashboards</text>
  
  <!-- Dashboard Icon -->
  <rect x="580" y="140" width="40" height="20" rx="2" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <line x1="585" y1="145" x2="595" y2="145" stroke="#3366FF" stroke-width="1"/>
  <line x1="600" y1="145" x2="615" y2="145" stroke="#3366FF" stroke-width="1"/>
  <line x1="585" y1="150" x2="605" y2="150" stroke="#3366FF" stroke-width="1"/>
  <line x1="585" y1="155" x2"595" y2="155" stroke="#3366FF" stroke-width="1"/>
  <line x1="600" y1="155" x2="615" y2="155" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Data Elements with Labels -->
  <rect x="120" y="250" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.7"/>
  <rect x="130" y="260" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.6"/>
  <rect x="140" y="270" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.5"/>
  <text x="150" y="290" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Raw Data</text>
  
  <rect x="270" y="250" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.7"/>
  <rect x="280" y="260" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.6"/>
  <text x="300" y="290" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Streaming Data</text>
  
  <rect x="420" y="250" width="60" height="20" rx="3" fill="url(#data-gradient)" opacity="0.7"/>
  <text x="450" y="280" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Transformed Data</text>
  
  <rect x="570" y="250" width="20" height="60" rx="3" fill="url(#data-gradient)" opacity="0.7"/>
  <rect x="600" y="230" width="20" height="80" rx="3" fill="url(#data-gradient)" opacity="0.8"/>
  <rect x="630" y="260" width="20" height="50" rx="3" fill="url(#data-gradient)" opacity="0.7"/>
  <text x="600" y="320" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Visualized Insights</text>
  
  <!-- Cloud Icons -->
  <path d="M100,100 Q110,90 120,100 Q130,90 125,105 Q135,110 125,115 Q130,125 120,120 Q110,130 105,120 Q95,125 100,115 Q90,110 100,105 Q95,95 100,100" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.5"/>
  
  <path d="M650,100 Q660,90 670,100 Q680,90 675,105 Q685,110 675,115 Q680,125 670,120 Q660,130 655,120 Q645,125 650,115 Q640,110 650,105 Q645,95 650,100" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Glow Effects -->
  <rect x="100" y="170" width="100" height="60" rx="5" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="250" y="170" width="100" height="60" rx="5" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="400" y="170" width="100" height="60" rx="5" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="550" y="170" width="100" height="60" rx="5" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="90" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Cloud-Native Data Pipeline</text>
  <text x="400" y="120" font-family="Arial" font-size="18" fill="#3366FF" text-anchor="middle">Real-Time Analytics at Scale</text>
  
  <!-- Metrics -->
  <text x="400" y="350" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">Processing 2TB+ data daily with sub-second latency</text>
  <text x="400" y="370" font-family="Arial" font-size="14" fill="#3366FF" text-anchor="middle">99.99% uptime with auto-scaling and self-healing</text>
</svg>
