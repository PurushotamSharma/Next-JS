<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="pod-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2A3343" />
      <stop offset="100%" stop-color="#1A2333" />
    </radialGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#00FF99" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Kubernetes Cluster -->
  <circle cx="400" cy="200" r="120" fill="none" stroke="#00FF99" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="400" cy="200" r="100" fill="none" stroke="#00FF99" stroke-width="2"/>
  
  <!-- Control Plane -->
  <rect x="370" y="120" width="60" height="40" rx="5" fill="url(#pod-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">API</text>
  
  <!-- Worker Nodes -->
  <rect x="310" y="190" width="60" height="40" rx="5" fill="url(#pod-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="340" y="215" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Node 1</text>
  
  <rect x="430" y="190" width="60" height="40" rx="5" fill="url(#pod-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="460" y="215" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Node 2</text>
  
  <rect x="370" y="260" width="60" height="40" rx="5" fill="url(#pod-gradient)" stroke="#00FF99" stroke-width="2"/>
  <text x="400" y="285" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">Node 3</text>
  
  <!-- Connecting Lines with Animation Effect -->
  <line x1="400" y1="120" x2="400" y2="100" stroke="#00FF99" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="310" y1="210" x2="290" y2="210" stroke="#00FF99" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="490" y1="210" x2="510" y2="210" stroke="#00FF99" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="400" y1="300" x2="400" y2="320" stroke="#00FF99" stroke-width="2" stroke-dasharray="5,3"/>
  
  <line x1="400" y1="160" x2="340" y2="190" stroke="#00FF99" stroke-width="2"/>
  <line x1="400" y1="160" x2="460" y2="190" stroke="#00FF99" stroke-width="2"/>
  <line x1="340" y1="230" x2="390" y2="260" stroke="#00FF99" stroke-width="2"/>
  <line x1="460" y1="230" x2="410" y2="260" stroke="#00FF99" stroke-width="2"/>
  
  <!-- Pods -->
  <circle cx="320" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="335" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="350" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  
  <circle cx="440" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="455" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="470" cy="200" r="8" fill="#00FF99" opacity="0.5"/>
  
  <circle cx="380" cy="270" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="395" cy="270" r="8" fill="#00FF99" opacity="0.5"/>
  <circle cx="410" cy="270" r="8" fill="#00FF99" opacity="0.5"/>
  
  <!-- External Services -->
  <path d="M250,150 Q270,130 290,150 Q310,130 300,170 Q330,180 300,200 Q310,230 290,220 Q270,240 250,220 Q230,230 240,200 Q210,180 240,170 Q230,130 250,150" fill="#1A2333" stroke="#00FF99" stroke-width="1.5" opacity="0.8"/>
  <text x="270" y="185" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Load</text>
  <text x="270" y="200" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Balancer</text>
  
  <path d="M530,150 Q550,130 570,150 Q590,130 580,170 Q610,180 580,200 Q590,230 570,220 Q550,240 530,220 Q510,230 520,200 Q490,180 520,170 Q510,130 530,150" fill="#1A2333" stroke="#00FF99" stroke-width="1.5" opacity="0.8"/>
  <text x="550" y="185" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Storage</text>
  <text x="550" y="200" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">Services</text>
  
  <!-- Connection to External Services -->
  <line x1="290" y1="185" x2="310" y2="200" stroke="#00FF99" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="510" y1="185" x2="490" y2="200" stroke="#00FF99" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Glow Effects -->
  <circle cx="400" cy="200" r="100" fill="none" stroke="#00FF99" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="100" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Container Orchestration Platform</text>
  <text x="400" y="130" font-family="Arial" font-size="18" fill="#00FF99" text-anchor="middle">Scaling with Confidence</text>
  
  <!-- Metrics -->
  <text x="400" y="340" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">200+ microservices with 99.99% uptime</text>
  <text x="400" y="360" font-family="Arial" font-size="14" fill="#00FF99" text-anchor="middle">Resource utilization improved by 45%</text>
</svg>
