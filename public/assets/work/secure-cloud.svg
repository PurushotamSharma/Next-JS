<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3366FF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#3366FF" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cloud-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2A3343" />
      <stop offset="100%" stop-color="#1A2333" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Binary Background Pattern -->
  <text x="100" y="80" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">10110101001010101001010100101010</text>
  <text x="100" y="90" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">01010101001010101010101010101010</text>
  <text x="100" y="100" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">10101010101010010101010010101010</text>
  
  <text x="500" y="80" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">10110101001010101001010100101010</text>
  <text x="500" y="90" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">01010101001010101010101010101010</text>
  <text x="500" y="100" font-family="monospace" font-size="10" fill="#3366FF" opacity="0.1">10101010101010010101010010101010</text>
  
  <!-- Cloud with Shield -->
  <path d="M400,120 Q450,80 500,120 Q550,100 530,150 Q570,160 550,190 Q590,220 540,230 Q520,280 470,250 Q440,290 410,260 Q360,280 370,230 Q330,210 360,180 Q340,150 370,140 Q370,100 400,120" fill="url(#cloud-gradient)" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Shield with Gradient -->
  <path d="M400,150 L450,150 L450,220 L400,250 L350,220 L350,150 Z" fill="url(#shield-gradient)" stroke="#3366FF" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Shield Inner Glow -->
  <path d="M400,170 L430,170 L430,210 L400,230 L370,210 L370,170 Z" fill="#3366FF" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Shield Checkmark -->
  <path d="M385,195 L395,205 L415,185" fill="none" stroke="#3366FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Lock with Details -->
  <rect x="385" y="190" width="30" height="25" rx="3" fill="#1A2333" stroke="#3366FF" stroke-width="2"/>
  <rect x="395" y="180" width="10" height="15" rx="2" fill="none" stroke="#3366FF" stroke-width="2"/>
  <circle cx="400" cy="200" r="3" fill="#3366FF"/>
  <line x1="400" y1="200" x2="400" y2="205" stroke="#3366FF" stroke-width="2"/>
  
  <!-- Security Elements with Icons -->
  <!-- Encryption -->
  <rect x="150" y="220" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="240" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Encryption</text>
  <path d="M165,235 L175,225 L185,235" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M165,225 L175,235 L185,225" fill="none" stroke="#3366FF" stroke-width="1"/>
  
  <!-- IAM Controls -->
  <rect x="150" y="260" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="280" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">IAM Controls</text>
  <circle cx="175" cy="275" r="7" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M172,270 L178,270" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M175,270 L175,280" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M170,280 L180,280" fill="none" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Compliance -->
  <rect x="530" y="220" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="240" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Compliance</text>
  <rect x="555" y="230" width="10" height="10" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M555,235 L565,235" fill="none" stroke="#3366FF" stroke-width="1"/>
  <path d="M560,230 L560,240" fill="none" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Audit Logging -->
  <rect x="530" y="260" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="280" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Audit Logging</text>
  <path d="M550,275 L555,275 L560,270 L565,280 L570,275" fill="none" stroke="#3366FF" stroke-width="1"/>
  
  <!-- Additional Security Features -->
  <rect x="150" y="300" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="320" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DDoS Protection</text>
  
  <rect x="340" y="300" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="320" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Zero Trust</text>
  
  <rect x="530" y="300" width="120" height="30" rx="5" fill="#1A2333" stroke="#3366FF" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="320" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Threat Detection</text>
  
  <!-- Connecting Lines with Animation -->
  <line x1="270" y1="235" x2="350" y2="200" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="30s" repeatCount="indefinite" />
  </line>
  <line x1="270" y1="275" x2="370" y2="210" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="25s" repeatCount="indefinite" />
  </line>
  <line x1="530" y1="235" x2="450" y2="200" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="20s" repeatCount="indefinite" />
  </line>
  <line x1="530" y1="275" x2="430" y2="210" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="15s" repeatCount="indefinite" />
  </line>
  
  <!-- Additional Connection Lines -->
  <line x1="210" y1="300" x2="370" y2="250" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="18s" repeatCount="indefinite" />
  </line>
  <line x1="400" y1="300" x2="400" y2="250" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="22s" repeatCount="indefinite" />
  </line>
  <line x1="590" y1="300" x2="430" y2="250" stroke="#3366FF" stroke-width="1" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="8;0" dur="27s" repeatCount="indefinite" />
  </line>
  
  <!-- Perimeter Security -->
  <rect x="100" y="120" width="20" height="20" rx="10" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="110" y="134" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">FW</text>
  
  <rect x="680" y="120" width="20" height="20" rx="10" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="690" y="134" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">FW</text>
  
  <rect x="100" y="180" width="20" height="20" rx="10" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="110" y="194" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">WAF</text>
  
  <rect x="680" y="180" width="20" height="20" rx="10" fill="#1A2333" stroke="#3366FF" stroke-width="1"/>
  <text x="690" y="194" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">WAF</text>
  
  <!-- Scanning Radar Animation -->
  <circle cx="400" cy="200" r="70" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.1">
    <animate attributeName="r" values="70;100;70" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="400" cy="200" r="50" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="50;80;50" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Glow Effects -->
  <path d="M400,150 L450,150 L450,220 L400,250 L350,220 L350,150 Z" fill="none" stroke="#3366FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="90" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Secure Cloud Infrastructure</text>
  <text x="400" y="120" font-family="Arial" font-size="18" fill="#3366FF" text-anchor="middle">Security-First Methodology</text>
  
  <!-- Metrics -->
  <text x="400" y="350" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">SOC 2 Type II and HIPAA Compliant</text>
  <text x="400" y="370" font-family="Arial" font-size="14" fill="#3366FF" text-anchor="middle">99.99% uptime with zero security breaches</text>
</svg>
