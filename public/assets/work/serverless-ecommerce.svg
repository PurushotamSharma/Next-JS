<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#0F1525" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="box-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2333" />
      <stop offset="100%" stop-color="#141C2B" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg-gradient)"/>
  <rect x="50" y="50" width="700" height="300" rx="10" fill="#2A3343" stroke="#FF6B6B" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <path d="M0,0 L800,400" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M0,400 L800,0" stroke="#3A4353" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- Traffic Spike Visualization -->
  <path d="M100,320 L120,290 L140,310 L160,280 L180,300 L200,260 L220,270 L240,220 L260,230 L280,180 L300,190 L320,150 L340,170 L360,130 L380,150 L400,110 L420,130 L440,100 L460,120 L480,90 L500,110 L520,80 L540,100 L560,70 L580,90 L600,60 L620,80 L640,50 L660,70 L680,40" 
        fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-opacity="0.3" />
  <text x="120" y="340" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="start">Traffic Spike Handling</text>
  
  <!-- Users with Devices -->
  <circle cx="150" cy="150" r="30" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <circle cx="150" cy="140" r="8" fill="#FF6B6B"/>
  <path d="M135,160 C135,175 165,175 165,160" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="150" y="190" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Users</text>
  
  <!-- User Devices -->
  <rect x="120" y="200" width="20" height="30" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <line x1="125" y1="205" x2="135" y2="205" stroke="#FF6B6B" stroke-width="1"/>
  <line x1="130" y1="225" x2="130" y2="225" stroke="#FF6B6B" stroke-width="1"/>
  
  <rect x="150" y="200" width="30" height="20" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <line x1="155" y1="210" x2="175" y2="210" stroke="#FF6B6B" stroke-width="1"/>
  
  <rect x="190" y="200" width="20" height="15" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <circle cx="200" cy="215" r="3" fill="#FF6B6B"/>
  
  <!-- API Gateway with Details -->
  <rect x="250" y="130" width="100" height="60" rx="5" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="300" y="150" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">API Gateway</text>
  <text x="300" y="170" font-family="Arial" font-size="10" fill="#FF6B6B" text-anchor="middle">Auto-scaling Endpoints</text>
  
  <!-- Gateway Details -->
  <line x1="260" y1="180" x2="340" y2="180" stroke="#FF6B6B" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="270" cy="180" r="3" fill="#FF6B6B"/>
  <circle cx="290" cy="180" r="3" fill="#FF6B6B"/>
  <circle cx="310" cy="180" r="3" fill="#FF6B6B"/>
  <circle cx="330" cy="180" r="3" fill="#FF6B6B"/>
  
  <!-- Lambda Functions with Details -->
  <rect x="400" y="100" width="80" height="40" rx="5" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="440" y="120" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Lambda</text>
  <text x="440" y="135" font-family="Arial" font-size="8" fill="#FF6B6B" text-anchor="middle">Product Service</text>
  
  <rect x="400" y="150" width="80" height="40" rx="5" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="440" y="170" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Lambda</text>
  <text x="440" y="185" font-family="Arial" font-size="8" fill="#FF6B6B" text-anchor="middle">Order Service</text>
  
  <rect x="400" y="200" width="80" height="40" rx="5" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="440" y="220" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Lambda</text>
  <text x="440" y="235" font-family="Arial" font-size="8" fill="#FF6B6B" text-anchor="middle">Payment Service</text>
  
  <!-- Auto-scaling Indicators -->
  <rect x="390" y="100" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.3"/>
  <rect x="385" y="100" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.2"/>
  <rect x="380" y="100" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.1"/>
  
  <rect x="390" y="150" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.3"/>
  <rect x="385" y="150" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.2"/>
  <rect x="380" y="150" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.1"/>
  
  <rect x="390" y="200" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.3"/>
  <rect x="385" y="200" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.2"/>
  <rect x="380" y="200" width="5" height="40" rx="2" fill="#FF6B6B" opacity="0.1"/>
  
  <!-- DynamoDB with Details -->
  <path d="M550,160 L600,140 L650,160 L600,180 Z" fill="url(#box-gradient)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="600" y="165" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DynamoDB</text>
  
  <!-- Database Tables -->
  <rect x="570" y="190" width="60" height="15" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <text x="600" y="200" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Products</text>
  
  <rect x="570" y="210" width="60" height="15" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <text x="600" y="220" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Orders</text>
  
  <rect x="570" y="230" width="60" height="15" rx="2" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <text x="600" y="240" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">Payments</text>
  
  <!-- Event Bus -->
  <rect x="500" y="250" width="120" height="30" rx="5" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <text x="560" y="270" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">EventBridge</text>
  
  <!-- S3 Bucket -->
  <path d="M650,220 L680,220 L690,240 L640,240 Z" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <rect x="650" y="240" width="40" height="30" rx="0" fill="#1A2333" stroke="#FF6B6B" stroke-width="1"/>
  <text x="670" y="260" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">S3</text>
  
  <!-- Connections with Animation -->
  <line x1="180" y1="150" x2="250" y2="160" stroke="#FF6B6B" stroke-width="2"/>
  <circle cx="215" cy="155" r="3" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <line x1="350" y1="140" x2="400" y2="120" stroke="#FF6B6B" stroke-width="2"/>
  <circle cx="375" cy="130" r="3" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
  </circle>
  
  <line x1="350" y1="160" x2="400" y2="170" stroke="#FF6B6B" stroke-width="2"/>
  <circle cx="375" cy="165" r="3" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  
  <line x1="350" y1="180" x2="400" y2="220" stroke="#FF6B6B" stroke-width="2"/>
  <circle cx="375" cy="200" r="3" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <line x1="480" y1="120" x2="550" y2="160" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="480" y1="170" x2="550" y2="160" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="480" y1="220" x2="550" y2="160" stroke="#FF6B6B" stroke-width="2"/>
  
  <!-- Event Flow -->
  <line x1="440" y1="240" x2="500" y2="265" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="5,2"/>
  <line x1="560" y1="280" x2="560" y2="300" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="5,2"/>
  <line x1="620" y1="265" x2="650" y2="240" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="5,2"/>
  
  <!-- Glow Effects -->
  <circle cx="150" cy="150" r="30" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <rect x="250" y="130" width="100" height="60" rx="5" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <path d="M550,160 L600,140 L650,160 L600,180 Z" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Title with glow effect -->
  <text x="400" y="90" font-family="Arial" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#glow)">Serverless E-commerce Backend</text>
  <text x="400" y="120" font-family="Arial" font-size="18" fill="#FF6B6B" text-anchor="middle">Handling 10x Traffic Spikes Seamlessly</text>
  
  <!-- Metrics -->
  <text x="400" y="320" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle">95% cost reduction during normal traffic</text>
  <text x="400" y="340" font-family="Arial" font-size="14" fill="#FF6B6B" text-anchor="middle">Zero downtime during Black Friday sales spike</text>
  
  <!-- Cloud Provider Logo Hint -->
  <text x="700" y="80" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle">AWS</text>
  <rect x="680" y="70" width="40" height="20" rx="3" fill="none" stroke="#FF6B6B" stroke-width="1" stroke-opacity="0.5"/>
</svg>
